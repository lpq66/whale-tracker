# Whale Tracker Configuration

# Minimum SOL amount to track (data collection)
min_sol: 3.0

# Minimum SOL for "alert" tier (actionable signals)
alert_min_sol: 5.0

# Minimum wallet balance (SOL) to track
min_wallet_balance: 150.0

# Minimum market cap to track (skip dead tokens)
min_mc: 50000

# Minimum liquidity to track (can't sell if illiquid)
min_liquidity: 10000

# Win threshold (percentage MC gain)
win_threshold: 30.0

# Scoring weights
scoring:
  sol_5plus: 1        # +1 if sol_amount >= 5
  sol_10plus: 1       # +1 if sol_amount >= 10 (stacks with sol_5plus)
  wallet_boost: 1     # +1 if wallet_balance >= 200
  repeat_token: 1     # +1 if same token seen before
  mc_sweet_spot: 1    # +1 if MC between 50K-500K
  has_liquidity: 1    # +1 if liquidity > 10K
  min_alert_score: 3  # only alert on score >= 3

# Price check intervals in seconds
check_intervals:
  - 300   # 5 minutes
  - 900   # 15 minutes

# API sources (priority order)
apis:
  dexscreener:
    base_url: "https://api.dexscreener.com"
    rate_limit_delay: 1.0
  geckoterminal:
    base_url: "https://api.geckoterminal.com/api/v2"
    rate_limit_delay: 1.5

# Solana network
network: solana

# Database
database: whale_tracker.db

# Logging
log_level: INFO
