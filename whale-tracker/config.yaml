# Whale Tracker Configuration

# Minimum SOL amount to track (data collection)
min_sol: 3.0

# Minimum SOL for "alert" tier (actionable signals)
alert_min_sol: 5.0

# Minimum wallet balance (SOL) to track
min_wallet_balance: 150.0

# Minimum market cap to track (skip dead tokens)
min_mc: 30000

# Maximum market cap (skip tokens too big to pump)
max_mc: 100000

# Minimum liquidity to track (can't sell if illiquid)
min_liquidity: 10000

# Minimum liquidity/market_cap ratio (0.0 - 1.0)
# Higher = token has enough liq relative to MC to exit
min_liq_ratio: 0.05

# Minimum position size as % of wallet balance (0.01 = 1%)
# Filters out "dust buys" where whales throw pocket change
min_position_pct: 0.01

# Token dedup: disabled — multiple whales buying same token is a signal, not noise
# Message-level dedup still handled by seen_messages.json
dedup_window_minutes: 0

# Win threshold (percentage MC gain)
win_threshold: 30.0

# Scoring weights
scoring:
  sol_5plus: 1        # +1 if sol_amount >= 5
  sol_10plus: 1       # +1 if sol_amount >= 10 (stacks with sol_5plus)
  wallet_boost: 1     # +1 if wallet_balance >= 200
  repeat_token: 1     # +1 if same token seen before
  mc_sweet_spot: 1    # +1 if MC between 50K-500K
  has_liquidity: 1    # +1 if liquidity > 10K
  min_alert_score: 3  # only alert on score >= 3

# Price check intervals in seconds
check_intervals:
  - 300   # 5 minutes
  - 900   # 15 minutes

# API sources (priority order)
apis:
  dexscreener:
    base_url: "https://api.dexscreener.com"
    rate_limit_delay: 1.0
  geckoterminal:
    base_url: "https://api.geckoterminal.com/api/v2"
    rate_limit_delay: 1.5

# Solana network
network: solana

# Database
database: whale_tracker.db

# Logging
log_level: INFO

# === Momentum Monitor (feature branch) ===
momentum:
  enabled: true

  # Early trending channel
  early_channel_url: "https://t.me/s/solearlytrending"

  # How often to poll early trending channel (seconds)
  trending_poll_interval: 60

  # How often to check momentum on watchlist tokens (seconds)
  momentum_check_interval: 30

  # Watchlist expiry — remove tokens older than this (minutes)
  watchlist_ttl_minutes: 240  # 4 hours

  # Momentum triggers — all must be true to signal buy
  triggers:
    # MC must increase by this % from trending entry
    min_mc_increase_pct: 50

    # Maximum MC increase speed (% per minute) — filters out manipulation
    # If token pumps faster than this, it's likely a coordinated dump
    max_pump_speed_pct_per_min: 20

    # Minimum time on watchlist before trigger (seconds)
    # Let the dust settle before buying
    min_watchlist_age_seconds: 300  # 5 minutes

    # Minimum volume per hour (USD)
    min_volume_per_hour: 50000

    # Minimum holder count
    min_holders: 300

    # MC must be in this range: $30K-$100K (sweet spot from data)
    min_mc: 30000
    max_mc: 100000

    # Minimum liquidity (USD)
    min_liquidity: 15000

    # Liquidity ratio (liq/mc) — 25-35% is the sweet spot
    min_liq_ratio: 0.25
    max_liq_ratio: 0.35
